# ================================================================
# PRODUCTION PROFILE - SENSITIVE DATA MUST BE SET VIA ENV VARIABLES
# ================================================================
# WARNING: Never commit sensitive values to version control!
# All values below MUST be configured via environment variables
# when running on production servers like Render, Heroku, AWS, etc.

# Spring Boot Server
server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
spring.application.name=bibliotheque

# MySQL Configurations - MUST USE ENV VARIABLES IN PRODUCTION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - MUST USE ENV VARIABLES IN PRODUCTION
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# JWT Configuration (app prefix)
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# Logging (less verbose in production)
logging.level.root=WARN
logging.level.com.bibliotheque=INFO
