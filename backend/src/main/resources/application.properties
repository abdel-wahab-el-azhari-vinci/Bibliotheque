# Spring Boot Server
server.port=${SERVER_PORT:8083}
server.address=0.0.0.0
spring.application.name=bibliotheque

# MySQL Configurations (use environment variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bibliotheque?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (use environment variables)
# NOTE: fallback values below are for LOCAL DEV ONLY, rotated out of the previously
# committed defaults. Production MUST set JWT_SECRET / APP_JWT_SECRET via env vars
# (see application-prod.properties, which has no fallback and fails fast if unset).
jwt.secret=${JWT_SECRET:5jSqvjGPRY8J4O1vr7N8LGGt3xlhQYwvHv3IW/ITpiBY50HFUbweCog73KXZnYe8}
jwt.expiration=${JWT_EXPIRATION:86400000}

# JWT Configuration (app prefix)
app.jwt.secret=${APP_JWT_SECRET:PdSRDSu30zkEqmyRRT8HKsa81E97Jgju0vx6AcNgNTx5aOzXPVCFW0HqHxiO/DbD}
app.jwt.expiration=${APP_JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.root=INFO
logging.level.com.bibliotheque=DEBUG

# Flyway Configuration - DISABLED
spring.flyway.enabled=false
