# Spring Boot Server
server.port=${SERVER_PORT:8083}
server.address=0.0.0.0
spring.application.name=bibliotheque

# MySQL Configurations (use environment variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bibliotheque?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (use environment variables)
jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production-at-least-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# JWT Configuration (app prefix)
app.jwt.secret=${APP_JWT_SECRET:TerraSanaSecretKeyForJWTSigningMustBeVeryLongAndSecure_MinimumLength256Bits}
app.jwt.expiration=${APP_JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.root=INFO
logging.level.com.bibliotheque=DEBUG

# Flyway Configuration - DISABLED
spring.flyway.enabled=false
