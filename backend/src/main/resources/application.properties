# Spring Boot Server
server.port=8081
spring.application.name=bibliotheque

# MySQL Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-super-secret-key-change-this-in-production-at-least-256-bits-long
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.bibliotheque=DEBUG
